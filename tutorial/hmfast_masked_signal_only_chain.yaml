# Cobaya YAML to reproduce the tszpower "masked_signal_only" posterior contour
# (/scratch/scratch-lxu/tsz_cnc_paper_plots/masked_signal_only_posterior_contour.png)
# using hmfast's HMFastTSZMaskedScatter as the theory backend.
#
# - Prior, ref, proposal, sampler settings mirror the tszpower chain YAML at
#   /scratch/scratch-lxu/tsz_cnc_scatter/chains/chains_tszpower_scatter_masked_signal_only/tszpower_scatter_masked_signal_only_chain.input.yaml
# - Likelihood and data are the tszpower SignalOnly likelihood pointing at
#   the same Dl_binned_masked_signal_only_real0.txt + covmat.
# - Theory module is the hmfast wrapper that exposes the same Cl_sz["1h"]
#   contract.

theory:
  hmfast.tutorial.hmfast_cobaya_theory_masked_scatter.HMFastTSZMaskedScatter:
    q_cat: 5.0
    M_min: 6.766e13
    M_max: 6.766e15
    z_min: 0.005
    z_max: 3.0
    n_grid_mz: 100
    n_ell_internal: 50

likelihood:
  tszpower.tszpower_cobaya_likelihood_masked.tSZ_PS_Likelihood_SignalOnly:
    data_directory: /scratch/scratch-lxu/tsz_cnc_scatter/synthetic_data
    data_file: Dl_binned_masked_signal_only_real0.txt
    cov_file: covmat_Dl_binned_masked_signal_only.txt

params:
  H0:
    prior: {dist: norm, loc: 73.8, scale: 2.4}
    ref:   {dist: norm, loc: 73.8, scale: 2.4}
    proposal: 0.6
    latex: H_0
  ln10_10A_s:
    prior: {min: 2.5, max: 3.5}
    ref:   {dist: norm, loc: 2.9718, scale: 0.13}
    proposal: 0.13
    latex: \ln(10^{10}A_s)
  n_s:
    prior: {dist: norm, loc: 0.962, scale: 0.014}
    ref:   {dist: norm, loc: 0.962, scale: 0.014}
    proposal: 0.014
    latex: n_\mathrm{s}
  omega_b:
    prior: {dist: norm, loc: 0.022, scale: 0.002}
    ref:   {dist: norm, loc: 0.022, scale: 0.002}
    proposal: 0.002
    latex: \Omega_\mathrm{b} h^2
  Omega_m:
    prior: {min: 0.2, max: 0.5}
    ref:   {dist: norm, loc: 0.3096, scale: 0.02}
    proposal: 0.02
    latex: \Omega_m
  omega_cdm:
    value: 'lambda Omega_m, H0, omega_b: Omega_m * (H0 / 100.0)**2 - omega_b'
    latex: \Omega_\mathrm{c} h^2
  tau_reio:
    value: 0.0544
    latex: \tau_{reio}
  one_minus_b:
    value: 0.709
    latex: 1-b
  B:
    value: 'lambda one_minus_b: 1.0 / one_minus_b'
    latex: B
  A_SZ:
    prior: {min: -4.41, max: -4.21}
    ref:   {dist: norm, loc: -4.31, scale: 0.02}
    proposal: 0.02
    latex: A_\mathrm{SZ}
  alpha_SZ:
    prior: {min: 1.0, max: 1.24}
    ref:   {dist: norm, loc: 1.12, scale: 0.02}
    proposal: 0.02
    latex: \alpha_\mathrm{SZ}
  sigma_lnY:
    prior: {dist: norm, loc: 0.173, scale: 0.023}
    ref:   {dist: norm, loc: 0.173, scale: 0.023}
    proposal: 0.01
    latex: \sigma_{\ln Y}

sampler:
  mcmc:
    Rminus1_stop: 0.05
    drag: false
    proposal_scale: 1.2
    learn_every: 40
    learn_proposal: true
    learn_proposal_Rminus1_max: 100.0
    learn_proposal_Rminus1_max_early: 100.0
    max_tries: 100000
    burn_in: 50

output: hmfast_scatter_masked_signal_only_chain
logging_level: 2
timing: true
