# Cobaya + hmfast tutorial: full-sky signal-only binned 1e12*D_l (no FG, no A_SZ / alpha_SZ / sigma_lnY).
# Data/cov in synthetic_data are 10^12 * D_ell; theory module applies the same scale to hmfast D_ell.
# Run from shell with PYTHONPATH including this tutorial directory and hmfast `src/`, e.g.:
#   export PYTHONPATH="/path/to/hmfast/src:/path/to/hmfast/tutorial:${PYTHONPATH}"
# Single process + one GPU (theory caps JAX at ~50% VRAM via MEM_FRACTION=0.5):
#   export HMFAST_COBAYA_USE_GPU=1
#   cobaya-run cobaya_tszhmfast_fullsky.yaml
# MPI: each rank = separate chain. One GPU: ranks contend (per-step time often > np 1).
# Two GPUs:  mpirun -np 2 cobaya-run ...  → rank i uses GPU (i % HMFAST_COBAYA_NUM_GPUS); default NUM_GPUS=2.
# More ranks than GPUs: each rank uses 0.5 / ranks_per_gpu; one rank per GPU uses MEM_FRACTION=0.5.
# Or CPU:  export HMFAST_COBAYA_USE_GPU=0
#   mpirun -np 4 cobaya-run cobaya_tszhmfast_fullsky.yaml

output: chains/tutorial_hmfast_tszhmfast_fullsky/chains

likelihood:
  cobaya_tutorial_likelihood.tSZ_PS_Likelihood_FullSkyNPY:
    data_directory: "/scratch/scratch-lxu/tsz_cnc_scatter/synthetic_data"
    data_file: "Dl_binned_fullsky_signal_only_real0.txt"
    cov_file: "covmat_Dl_binned_fullsky_signal_only.npy"
    # Log chi2 / loglike every N steps (1 = every eval, like tszsbi; 0 = off)
    log_every: 1

theory:
  hmfast_cobaya_theory_fullsky.HMFastTSZFullSky:
    data_vector_file: "/scratch/scratch-lxu/tsz_cnc_scatter/synthetic_data/Dl_binned_fullsky_signal_only_real0.txt"

params:
  H0:
    prior:
      dist: norm
      loc: 67.4
      scale: 1.0
    ref:
      dist: norm
      loc: 67.4
      scale: 1.0
    proposal: 0.6
    latex: H_0

  ln10_10A_s:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 2.9718
      scale: 0.13
    proposal: 0.13
    latex: "\\ln(10^{10}A_s)"

  n_s:
    prior:
      dist: norm
      loc: 0.962
      scale: 0.014
    ref:
      dist: norm
      loc: 0.962
      scale: 0.014
    proposal: 0.014
    latex: n_\mathrm{s}

  omega_b:
    prior:
      dist: norm
      loc: 0.022
      scale: 0.002
    ref:
      dist: norm
      loc: 0.022
      scale: 0.002
    proposal: 0.002
    latex: \Omega_\mathrm{b} h^2

  Omega_m:
    prior:
      min: 0.2
      max: 0.5
    ref:
      dist: norm
      loc: 0.3096
      scale: 0.02
    proposal: 0.02
    latex: \Omega_m

  omega_cdm:
    value: "lambda Omega_m, H0, omega_b: Omega_m * (H0 / 100.0)**2 - omega_b"
    latex: \Omega_\mathrm{c} h^2

  tau_reio:
    value: 0.0544
    latex: "\\tau_{reio}"

  B:
    prior:
      min: 1.0
      max: 2.0
    ref:
      dist: norm
      loc: 1.41
      scale: 0.05
    proposal: 0.05
    latex: B

sampler:
  mcmc:
    # Convergence (Cobaya 3.x): use Rminus1_stop; Rminus1_stop_geom is not valid in all versions.
    Rminus1_stop: 0.1
    drag: false
    proposal_scale: 1.2
    learn_every: 40
    learn_proposal: true
    burn_in: 30
    max_tries: 50000

timing: true
logging_level: info
