params:
  H0:
    prior:
      dist: norm
      loc: 73.8
      scale: 2.4
    ref:
      dist: norm
      loc: 73.8
      scale: 2.4
    proposal: 0.6
    latex: H_0
  ln10_10A_s:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 2.9718
      scale: 0.13
    proposal: 0.13
    latex: \ln(10^{10}A_s)
  n_s:
    prior:
      dist: norm
      loc: 0.962
      scale: 0.014
    ref:
      dist: norm
      loc: 0.962
      scale: 0.014
    proposal: 0.014
    latex: n_\mathrm{s}
  omega_b:
    prior:
      dist: norm
      loc: 0.022
      scale: 0.002
    ref:
      dist: norm
      loc: 0.022
      scale: 0.002
    proposal: 0.002
    latex: \Omega_\mathrm{b} h^2
  Omega_m:
    prior:
      min: 0.2
      max: 0.5
    ref:
      dist: norm
      loc: 0.3096
      scale: 0.02
    proposal: 0.02
    latex: \Omega_m
  omega_cdm:
    value: 'lambda Omega_m, H0, omega_b: Omega_m * (H0 / 100.0)**2 - omega_b'
    latex: \Omega_\mathrm{c} h^2
    derived: true
  tau_reio:
    value: 0.0544
    latex: \tau_{reio}
  one_minus_b:
    value: 0.709
    latex: 1-b
  B:
    value: 'lambda one_minus_b: 1.0 / one_minus_b'
    latex: B
    derived: true
  A_SZ:
    prior:
      min: -4.41
      max: -4.21
    ref:
      dist: norm
      loc: -4.31
      scale: 0.02
    proposal: 0.02
    latex: A_\mathrm{SZ}
  alpha_SZ:
    prior:
      min: 1.0
      max: 1.24
    ref:
      dist: norm
      loc: 1.12
      scale: 0.02
    proposal: 0.02
    latex: \alpha_\mathrm{SZ}
  sigma_lnY:
    prior:
      dist: norm
      loc: 0.173
      scale: 0.023
    ref:
      dist: norm
      loc: 0.173
      scale: 0.023
    proposal: 0.01
    latex: \sigma_{\ln Y}
